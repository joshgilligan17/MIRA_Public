services:
  mira:
    build:
      context: .
    image: mira-public:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MIRA_JOB_ROOT: /data/mira/jobs
      MIRA_PROJECT_ROOT: /data/mira/projects
      MIRA_MODEL_ROOT: /data/mira/models
    volumes:
      - ${MIRA_DATA_DIR:-./data/mira/jobs}:/data/mira/jobs
      - ${MIRA_PROJECT_DIR:-./data/mira/projects}:/data/mira/projects
      - ${MIRA_MODEL_DIR:-./data/mira/models}:/data/mira/models
    expose:
      - "8000"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    depends_on:
      - mira
    env_file:
      - .env
    ports:
      - "${MIRA_HTTP_PORT:-80}:80"
      - "${MIRA_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
